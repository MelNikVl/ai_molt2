<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Krisha Bot — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #22253a;
      --border:   #2e3150;
      --accent:   #5865f2;
      --accent2:  #7289da;
      --green:    #2ecc71;
      --red:      #e74c3c;
      --yellow:   #f39c12;
      --blue:     #3498db;
      --text:     #e8eaf6;
      --muted:    #8892b0;
      --sidebar-w: 220px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    /* sidebar */
    .sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; }
    .sidebar-logo { padding: 22px 20px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo .title { font-size: 15px; font-weight: 700; color: var(--accent2); }
    .sidebar-logo .sub   { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .nav { padding: 10px 0; flex: 1; }
    .nav a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--muted); text-decoration: none; font-size: 13.5px; border-left: 3px solid transparent; transition: all .15s; }
    .nav a:hover  { color: var(--text); background: var(--surface2); }
    .nav a.active { color: var(--accent2); border-left-color: var(--accent); background: rgba(88,101,242,.1); }
    .nav a .ico   { font-size: 16px; width: 20px; text-align: center; }
    .nav-section  { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 14px 20px 6px; }
    .sidebar-footer { padding: 14px 20px; border-top: 1px solid var(--border); }
    .sidebar-footer a { font-size: 12px; color: var(--muted); text-decoration: none; }
    .sidebar-footer a:hover { color: var(--red); }

    /* main */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 32px 36px; }
    .page-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 24px; }
    .page-title small { font-size: 13px; font-weight: 400; color: var(--muted); margin-left: 10px; }

    /* cards grid */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 8px; }
    .card-value { font-size: 30px; font-weight: 700; color: var(--text); }
    .card-sub   { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .card.g  { border-top: 3px solid var(--green); }
    .card.b  { border-top: 3px solid var(--blue); }
    .card.r  { border-top: 3px solid var(--red); }
    .card.y  { border-top: 3px solid var(--yellow); }
    .card.p  { border-top: 3px solid var(--accent); }

    /* badges */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge.g { background: rgba(46,204,113,.15); color: var(--green); }
    .badge.r { background: rgba(231,76,60,.15);  color: var(--red); }
    .badge.y { background: rgba(243,156,18,.15); color: var(--yellow); }
    .badge.b { background: rgba(52,152,219,.15); color: var(--blue); }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot.g { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.r { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    .dot.y { background: var(--yellow); }

    /* table */
    .tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--surface2); color: var(--muted); text-align: left; padding: 10px 16px; font-size: 11px; letter-spacing: .6px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; text-decoration: none; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-danger  { background: var(--red); color: #fff; }
    .btn-danger:hover  { background: #c0392b; }
    .btn-ghost   { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover   { color: var(--text); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* section header */
    .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .sec-head h2 { font-size: 15px; font-weight: 600; }

    /* terminal */
    .terminal { background: #080b0f; border: 1px solid var(--border); border-radius: 10px; font-family: "JetBrains Mono","Fira Code","Courier New",monospace; font-size: 12px; line-height: 1.75; padding: 16px 18px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    .log-INFO    { color: #98c379; }
    .log-WARNING { color: #e5c07b; }
    .log-ERROR   { color: #e06c75; }
    .log-DEBUG   { color: #56b6c2; }
    .log-DEFAULT { color: #abb2bf; }

    /* misc */
    code { font-family: monospace; background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .mt { margin-top: 28px; }
    .flex { display: flex; } .gap { gap: 10px; } .items-c { align-items: center; }
    .text-muted { color: var(--muted); } .text-sm { font-size: 12px; }
    select, input[type="number"], input[type="password"], input[type="text"] {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px; font-size: 13px;
    }
    select:focus, input:focus { outline: 1px solid var(--accent); }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="title">🏠 Krisha Bot</div>
    <div class="sub">Admin Panel</div>
  </div>
  <nav class="nav">
    <div class="nav-section">Мониторинг</div>
    <a href="/admin"             class="{% if request.url.path == '/admin' %}active{% endif %}"><span class="ico">📊</span> Дашборд</a>
    <a href="/admin/logs"        class="{% if 'logs' in request.url.path %}active{% endif %}"><span class="ico">📋</span> Логи</a>
    <a href="/admin/issues"      class="{% if 'issues' in request.url.path %}active{% endif %}"><span class="ico">⚠️</span> Ошибки парсера</a>
    <div class="nav-section">Управление</div>
    <a href="/admin/users"       class="{% if 'users' in request.url.path and 'sub' not in request.url.path %}active{% endif %}"><span class="ico">👥</span> Пользователи</a>
    <a href="/admin/subscriptions" class="{% if 'subscriptions' in request.url.path %}active{% endif %}"><span class="ico">🔑</span> Подписки</a>
  </nav>
  <div class="sidebar-footer">
    <a href="/admin/logout">⬅ Выйти</a>
  </div>
</aside>

<main class="main">
{% block content %}{% endblock %}
</main>
</body>
</html>
