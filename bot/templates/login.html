<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Krisha Bot — Вход</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:#0f1117;color:#e8eaf6;min-height:100vh;
      display:flex;align-items:center;justify-content:center}
    .card{background:#1a1d27;border:1px solid #2e3150;border-radius:16px;
      padding:40px 36px;width:100%;max-width:380px}
    .logo{font-size:18px;font-weight:700;color:#7289da;margin-bottom:4px}
    .sub{font-size:13px;color:#8892b0;margin-bottom:28px}
    label{display:block;font-size:12px;color:#8892b0;margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
    input[type=password]{width:100%;background:#22253a;color:#e8eaf6;border:1px solid #2e3150;
      border-radius:8px;padding:10px 14px;font-size:14px;margin-bottom:20px}
    input[type=password]:focus{outline:1px solid #5865f2}
    button{width:100%;background:#5865f2;color:#fff;border:none;border-radius:8px;
      padding:11px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
    button:hover{background:#7289da}
    .err{background:rgba(231,76,60,.15);color:#e74c3c;border-radius:8px;
      padding:10px 14px;font-size:13px;margin-bottom:16px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏠 Krisha Bot</div>
    <div class="sub">Admin Panel</div>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="post" action="/admin/login">
      <label>Пароль</label>
      <input type="password" name="password" placeholder="••••••••" autofocus required>
      <button type="submit">Войти →</button>
    </form>
  </div>
</body>
</html>
