{% extends "base.html" %}
{% block content %}
<h2>Выдача подписки</h2>
<form method="post" action="/admin/subscriptions">
  <label>User ID <input type="number" name="user_id" required></label><br><br>
  <label>Role
    <select name="role">
      <option value="1">1 день</option>
      <option value="2">7 дней</option>
      <option value="3">30 дней</option>
    </select>
  </label><br><br>
  <label>Дней (информативно) <input type="number" name="days" value="0" required></label><br><br>
  <button type="submit">Выдать</button>
</form>
{% endblock %}
